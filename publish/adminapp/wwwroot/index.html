<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Earth Bora Solutions Admin</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Agrovet.AdminApp.styles.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.6.0/jspdf.plugin.autotable.min.js"></script>
    <script>
        window.printReceipt = function(orderData) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // Header background
            doc.setFillColor(27, 94, 32);
            doc.rect(0, 0, 210, 40, 'F');

            // Logo text
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(22);
            doc.setFont('helvetica', 'bold');
            doc.text('EARTH BORA SOLUTIONS', 105, 18, { align: 'center' });
            doc.setFontSize(10);
            doc.setFont('helvetica', 'normal');
            doc.text('Quality Farm Inputs | Nakuru, Kenya | 0712 345 678', 105, 28, { align: 'center' });
            doc.text('info@earthbora.co.ke', 105, 36, { align: 'center' });

            // Receipt title
            doc.setTextColor(27, 94, 32);
            doc.setFontSize(16);
            doc.setFont('helvetica', 'bold');
            doc.text('ORDER RECEIPT', 105, 55, { align: 'center' });

            // Divider
            doc.setDrawColor(27, 94, 32);
            doc.setLineWidth(0.5);
            doc.line(14, 60, 196, 60);

            // Order info
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(10);
            doc.setFont('helvetica', 'normal');
            doc.text('Order Number:', 14, 70);
            doc.setFont('helvetica', 'bold');
            doc.text('#' + orderData.id.substring(0, 8).toUpperCase(), 60, 70);

            doc.setFont('helvetica', 'normal');
            doc.text('Date:', 14, 78);
            doc.setFont('helvetica', 'bold');
            doc.text(orderData.date, 60, 78);

            doc.setFont('helvetica', 'normal');
            doc.text('Customer:', 14, 86);
            doc.setFont('helvetica', 'bold');
            doc.text(orderData.customerName, 60, 86);

            doc.setFont('helvetica', 'normal');
            doc.text('Phone:', 14, 94);
            doc.setFont('helvetica', 'bold');
            doc.text(orderData.customerPhone, 60, 94);

            doc.setFont('helvetica', 'normal');
            doc.text('Payment:', 14, 102);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(orderData.paymentStatus === 'Paid' ? 27 : 198, orderData.paymentStatus === 'Paid' ? 94 : 40, orderData.paymentStatus === 'Paid' ? 32 : 40);
            doc.text(orderData.paymentStatus, 60, 102);

            doc.setTextColor(0, 0, 0);
            doc.setFont('helvetica', 'normal');
            doc.text('Status:', 120, 70);
            doc.setFont('helvetica', 'bold');
            doc.text(orderData.status, 150, 70);

            // Items table
            doc.setTextColor(0, 0, 0);
            doc.autoTable({
                startY: 112,
                head: [['#', 'Product', 'Qty', 'Unit Price', 'Subtotal']],
                body: orderData.items.map((item, i) => [
                    i + 1,
                    item.productName,
                    item.quantity,
                    'KSh ' + item.unitPrice.toFixed(2),
                    'KSh ' + item.subtotal.toFixed(2)
                ]),
                headStyles: {
                    fillColor: [27, 94, 32],
                    textColor: 255,
                    fontStyle: 'bold',
                    fontSize: 10
                },
                bodyStyles: { fontSize: 9 },
                alternateRowStyles: { fillColor: [240, 248, 240] },
                columnStyles: {
                    0: { cellWidth: 10 },
                    1: { cellWidth: 80 },
                    2: { cellWidth: 20, halign: 'center' },
                    3: { cellWidth: 35, halign: 'right' },
                    4: { cellWidth: 35, halign: 'right' }
                }
            });

            const finalY = doc.lastAutoTable.finalY + 10;

            // Total box
            doc.setFillColor(232, 245, 233);
            doc.rect(120, finalY, 76, 18, 'F');
            doc.setFontSize(12);
            doc.setFont('helvetica', 'bold');
            doc.setTextColor(27, 94, 32);
            doc.text('TOTAL:', 125, finalY + 12);
            doc.setFontSize(14);
            doc.text('KSh ' + orderData.totalAmount.toFixed(2), 193, finalY + 12, { align: 'right' });

            // Footer
            doc.setTextColor(150, 150, 150);
            doc.setFontSize(8);
            doc.setFont('helvetica', 'normal');
            doc.text('Thank you for shopping with Earth Bora Solutions!', 105, finalY + 35, { align: 'center' });
            doc.text('For inquiries call 0712 345 678 or email info@earthbora.co.ke', 105, finalY + 41, { align: 'center' });
            doc.text('Generated on ' + new Date().toLocaleString(), 105, finalY + 47, { align: 'center' });

            doc.save('EarthBora-Receipt-' + orderData.id.substring(0, 8).toUpperCase() + '.pdf');
        };
    </script>
</head>
<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>
    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
